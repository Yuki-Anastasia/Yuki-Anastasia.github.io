<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>About</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/main.js" defer></script>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="page-header">
      <nav class="nav" aria-label="Primary">
        <a class="brand" href="index.html" data-bind="site-title">Portfolio</a>
        <div class="page-nav">
          <a href="about.html" aria-current="page">About</a>
          <a href="projects.html">Projects</a>
          <a href="blog.html">Blog</a>

      </nav>

    <main id="main">
      <section class="page-hero">
        <p class="eyebrow">About</p>
        <h1>About Me</h1>
        <p class="about-copy" data-field="profile.about"></p>
      </section>

      <section class="section" id="highlights" data-section="highlights" hidden>
        <div class="section-heading">
          <p class="eyebrow">Highlights</p>

        <div class="feature-grid" data-list="highlights"></div>

      <section class="section" id="skills" data-section="skills" hidden>

          <p class="eyebrow">Skills</p>

        </div>

      <section class="section timeline-section" id="experience" data-section="experience" hidden>
        <div class="section-heading">
          <p class="eyebrow">Experience</p>
          <h2>Timeline</h2>
        </div>
        <div class="timeline" data-list="experience"></div>
      </section>

      <section class="section timeline-section" id="education" data-section="education" hidden>
        <div class="section-heading">
          <p class="eyebrow">Education</p>
          <h2>Learning</h2>
        </div>
        <div class="timeline" data-list="education"></div>
      </section>

    <footer class="site-footer">
      <p data-footer-title>Portfolio</p>
      <div class="social-links" data-social-links></div>
