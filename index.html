<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="color-scheme" content="dark">
    <title>Portfolio</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/main.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="landing-header">
      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#" data-bind="site-title">Portfolio</a>
        <div class="header-actions">
          <a class="button secondary" data-link="profile.resumeUrl" href="#" hidden>Resume</a>
          <a class="button primary" data-email="profile.email" href="#" hidden>Contact</a>
        </div>
      </nav>
    </header>

    <main id="main">
      <section class="profile-block profile-block-home" aria-labelledby="hero-title">
        <div class="portrait-frame" data-photo-wrap>
          <img data-photo alt="" hidden>
          <div class="portrait-placeholder" data-photo-placeholder>
            <span class="monogram" data-initials></span>
            <span class="caption">Photo coming soon</span>
          </div>
        </div>
        <div class="profile-info">
          <p class="eyebrow">Portfolio</p>
          <h1 id="hero-title" data-field="profile.name" data-fallback="Portfolio">Portfolio</h1>
          <dl class="stats-table" data-list="stats"></dl>
          <p class="hero-bio" data-field="profile.bio"></p>
        </div>
      </section>

      <section class="portal-grid" aria-label="Explore">
        <a class="portal portal-about" href="about.html">
          <span class="portal-arrow">&#8599;</span>
          <span class="portal-index">01</span>
          <h2 class="portal-title">About</h2>
          <p class="portal-sub">Who I am</p>
        </a>
        <a class="portal portal-projects" href="projects.html">
          <span class="portal-arrow">&#8599;</span>
          <span class="portal-index">02</span>
          <h2 class="portal-title">Projects</h2>
          <p class="portal-sub">Selected work</p>
        </a>
        <a class="portal portal-blog" href="blog.html">
          <span class="portal-arrow">&#8599;</span>
          <span class="portal-index">03</span>
          <h2 class="portal-title">Blog</h2>
          <p class="portal-sub">Notes &amp; writing</p>
        </a>
      </section>
    </main>

    <footer class="site-footer">
      <p data-footer-title>Portfolio</p>
      <div class="social-links" data-social-links></div>
    </footer>
  </body>
</html>
